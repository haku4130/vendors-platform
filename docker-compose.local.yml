services:
  db:
    image: postgres:17
    restart: 'no'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    ports:
      - '5432:5432'
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  adminer:
    image: adminer
    restart: 'no'
    depends_on:
      - db
    ports:
      - '8080:8080'
    environment:
      - ADMINER_DESIGN=pepa-linha-dark

  prestart:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env
      - .env.local
    environment:
      - POSTGRES_SERVER=db

  backend:
    build:
      context: ./backend
    restart: 'no'
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
    ports:
      - '8000:8000'
    volumes:
      - media-data:${MEDIA_ROOT:-/app/media}
      - ./backend/htmlcov:/app/htmlcov
    command:
      - fastapi
      - run
      - --reload
      - 'app/main.py'
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    env_file:
      - .env
      - .env.local
    environment:
      - POSTGRES_SERVER=db
      - SMTP_HOST=mailcatcher
      - SMTP_PORT=1025
      - SMTP_TLS=false
      - EMAILS_FROM_EMAIL=noreply@example.com

  mailcatcher:
    image: schickling/mailcatcher
    restart: 'no'
    ports:
      - '1080:1080'
      - '1025:1025'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: 'no'
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
    environment:
      - NUXT_PUBLIC_BACKEND_API_URL=http://localhost:8000
      - NUXT_BACKEND_API_URL=http://backend:8000
      - NUXT_PUBLIC_BACKEND_STATIC_URL=http://localhost:8088
      - NODE_ENV=development
    develop:
      watch:
        - path: ./frontend/package-lock.json
          action: rebuild

  media-nginx:
    image: nginx:stable-alpine
    restart: 'no'
    ports:
      - '8088:80'
    volumes:
      - media-data:${MEDIA_ROOT:-/app/media}
      - ./nginx/media.conf:/etc/nginx/templates/default.conf.template
    environment:
      - MEDIA_ROOT=${MEDIA_ROOT:-/app/media}
    command: /bin/sh -c "envsubst '$${MEDIA_ROOT}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  prometheus:
    profiles:
      - monitoring
    image: prom/prometheus:v3.0.1
    restart: 'no'
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  grafana:
    profiles:
      - monitoring
    image: grafana/grafana:11.4.0
    restart: 'no'
    ports:
      - '3001:3000'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    depends_on:
      - prometheus

  postgres-exporter:
    profiles:
      - monitoring
    image: prometheuscommunity/postgres-exporter:v0.18.0
    restart: 'no'
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER?Variable not set}:${POSTGRES_PASSWORD?Variable not set}@db:5432/${POSTGRES_DB?Variable not set}?sslmode=disable
    depends_on:
      - db

  node-exporter:
    profiles:
      - monitoring
    image: prom/node-exporter:v1.8.2
    restart: 'no'
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

volumes:
  app-db-data:
  media-data:
  prometheus-data:
  grafana-data:
